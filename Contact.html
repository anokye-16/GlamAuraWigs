<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | GlamAura Wigs</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#000;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
border-bottom:2px solid #ff4fa3;
background:#000;
}

.logo{
color:#ff4fa3;
font-size:26px;
font-weight:bold;
}

nav a{
color:white;
margin-left:20px;
text-decoration:none;
transition:0.3s;
}

nav a:hover{
color:#ff4fa3;
}

/* HERO */
.hero{
text-align:center;
padding:60px 20px 30px;
}

.hero h1{
color:#ff4fa3;
font-size:36px;
margin-bottom:10px;
}

.hero p{
color:#aaa;
font-size:16px;
}

/* CONTACT SECTION */
.contact-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:40px 60px;
}

/* CONTACT CARDS */
.card{
background:#111;
padding:20px;
border-radius:10px;
border:1px solid #222;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
border-color:#ff4fa3;
}

.card h3{
color:#ff4fa3;
}

.card p{
color:#ccc;
font-size:14px;
}

/* FORM */
.form-section{
text-align:center;
padding:40px 20px;
}

.form-section h2{
color:#ff4fa3;
margin-bottom:20px;
}

input, textarea{
width:60%;
max-width:500px;
padding:12px;
margin:10px 0;
border:none;
border-radius:6px;
background:#111;
color:white;
outline:none;
border:1px solid #222;
}

input:focus, textarea:focus{
border-color:#ff4fa3;
}

textarea{
height:120px;
resize:none;
}

/* BUTTON */
button{
background:#ff4fa3;
color:white;
border:none;
padding:12px 30px;
cursor:pointer;
border-radius:6px;
margin-top:10px;
transition:0.3s;
}

button:hover{
background:#ff2f90;
}

/* FOOTER */
footer{
text-align:center;
padding:20px;
border-top:1px solid #222;
margin-top:40px;
color:#aaa;
}

/* RESPONSIVE */
@media(max-width:768px){
header{
flex-direction:column;
text-align:center;
}

nav{
margin-top:10px;
}

input, textarea{
width:90%;
}
}

</style>

</head>

<body>

<!-- HEADER -->
<header>
<div class="logo">GlamAura Wigs</div>

<div id="navbar-container"></div>
<script>
	fetch('navbar.html').then(r => r.text()).then(html => {
		document.getElementById('navbar-container').innerHTML = html;
	});
</script>
</header>

<!-- HERO -->
<div class="hero">
<h1>Contact Us</h1>
<p>We’re here to help you look and feel your best ✨</p>
</div>

<!-- CONTACT INFO CARDS -->
<div class="contact-container">

<div class="card">
<h3>Email Support</h3>
<p>support@glamaurawigs.com</p>
</div>

<div class="card">
<h3>WhatsApp</h3>
<p>+233 539 945 5123</p>
</div>

<div class="card">
<h3>Instagram</h3>
<p>@glamaurawigs</p>
</div>

</div>

<!-- CONTACT FORM -->
<div class="form-section">

<h2>Send Us a Message</h2>

<form>
<input type="text" placeholder="Your Name" required><br>
<input type="email" placeholder="Your Email" required><br>
<textarea placeholder="Your Message" required></textarea><br>

<button type="submit">Send Message</button>
</form>

</div>

<!-- FOOTER -->
<footer>
© 2026 GlamAura Wigs. All Rights Reserved.
</footer>

</body>
</html>
