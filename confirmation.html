<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Confirmed | GlamAura Wigs</title>
<link rel="stylesheet" href="shared.css">

<style>
body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#000;
color:white;
}
.page-top{padding-top:62px;}
.container{
background:#111;
padding:50px;
border-radius:15px;
width:400px;
max-width:90%;
margin:60px auto;
animation: pop 0.6s ease;
text-align:center;
}
button{margin-top:20px;padding:12px 20px;background:#ff4fa3;border:none;color:white;cursor:pointer;border-radius:5px;}
button:hover{background:#ff2f90;}


/* SUCCESS ANIMATION */
.checkmark{
width:100px;
height:100px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
margin:0 auto 20px;
background:#ff4fa3;
animation: pulse 1.2s infinite;
}

.checkmark:after{
content:"✔";
font-size:50px;
color:white;
}

/* TEXT */
h1{
color:#ff4fa3;
margin-bottom:10px;
}

p{
font-size:14px;
color:#ccc;
}

/* BUTTON */
button{
margin-top:20px;
padding:12px 20px;
background:#ff4fa3;
border:none;
color:white;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#ff2f90;
}

/* ANIMATIONS */
@keyframes pop{
from{transform:scale(0.6);opacity:0;}
to{transform:scale(1);opacity:1;}
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}

.small{
margin-top:10px;
font-size:13px;
color:#aaa;
}

</style>
</head>
<body>
<nav class="site-nav">

  <a href="About.html">About</a><a href="Contact.html">Contact</a>
  <a href="cart.html">🛒 Cart</a><a href="login.html" id="mobileAuthLink">Login / Sign Up</a>

<div class="page-top">
<div class="container">

<div class="checkmark"></div>

<h1>Order Confirmed!</h1>

<p class="small">Please save your Tracking ID for your records:</p>
<p style="color:#ff4fa3; font-weight:bold; font-size:24px; margin:10px 0;">
    <span id="trackId">Loading...</span>
</p>

<button onclick="window.location.href='customer_dashboard.html'">
Track Order
</button>

<br>

<button style="background:#333; margin-top:10px;" onclick="window.location.href='Shop.html'">
Continue Shopping
</button>

</div>

<script>

// get order id and tracking from URL
const params = new URLSearchParams(window.location.search);
const orderId = params.get("order_id");
const trackingId = params.get("tracking");

if (document.getElementById("trackId")) {
    document.getElementById("trackId").innerText = trackingId ? trackingId : "Processing...";
}

</script>
