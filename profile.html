<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile | GlamAura Wigs</title>
<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="navbar.css">
<style>

body{
background:#000;
color:white;
font-family:Arial,Helvetica,sans-serif;
margin:0;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
border-bottom:2px solid #ff4fa3;
}

.logo{
color:#ff4fa3;
font-size:26px;
font-weight:bold;
}

nav a{
color:white;
margin-left:20px;
text-decoration:none;
}

nav a:hover{
color:#ff4fa3;
}

h1{
text-align:center;
margin-top:40px;
color:#ff4fa3;
}

.profile-container{
width:600px;
margin:auto;
margin-top:40px;
background:#111;
padding:40px;
border-radius:10px;
}

.profile-container h2{
color:#ff4fa3;
margin-top:0;
}

label{
display:block;
margin-top:15px;
}

input{
width:100%;
padding:12px;
margin-top:5px;
border:none;
border-radius:5px;
background:#222;
color:white;
}

.save-btn{
width:100%;
margin-top:25px;
padding:14px;
background:#ff4fa3;
border:none;
color:white;
font-size:16px;
cursor:pointer;
border-radius:5px;
}

.save-btn:hover{
background:#ff2f90;
}

.order-history{
margin-top:40px;
background:#111;
padding:25px;
border-radius:10px;
}

.order{
display:flex;
justify-content:space-between;
border-bottom:1px solid #333;
padding:10px 0;
}

footer{
text-align:center;
padding:20px;
border-top:2px solid #ff4fa3;
margin-top:50px;
}

</style>
</head>

<body>

<header>
  <div class="logo">GlamAura Wigs</div>
  <div id="navbar-container"></div>
</header>
<script>
  fetch('navbar.html').then(r => r.text()).then(html => {
    document.getElementById('navbar-container').innerHTML = html;
    const script = document.createElement('script');
    script.src = 'navbar.js';
    document.body.appendChild(script);
  });
</script>

<h1>Customer Profile</h1>

<div class="profile-container">

<h2>Personal Information</h2>

<label>Full Name</label>
<input type="text" value="Jane Doe">

<label>Email</label>
<input type="email" value="jane@email.com">

<label>Phone Number</label>
<input type="text" value="+233...">

<label>Shipping Address</label>
<input type="text">

<button class="save-btn">Update Profile</button>

</div>


<div class="profile-container order-history">

<h2>Order History</h2>

<div class="order">
<span>Order #1021</span>
<span>Delivered</span>
</div>

<div class="order">
<span>Order #1022</span>
<span>Shipped</span>
</div>

<div class="order">
<span>Order #1023</span>
<span>Processing</span>
</div>

</div>

<footer>
© 2026 GlamAura Wigs
</footer>

</body>
</html>
