<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Order | GlamAura Wigs</title>
<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="navbar.css">
<style>

body{
background:#000;
color:white;
font-family:Arial,Helvetica,sans-serif;
margin:0;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
border-bottom:2px solid #ff4fa3;
}

.logo{
color:#ff4fa3;
font-size:26px;
font-weight:bold;
}

nav a{
color:white;
margin-left:20px;
text-decoration:none;
}

nav a:hover{
color:#ff4fa3;
}

h1{
text-align:center;
margin-top:40px;
color:#ff4fa3;
}

.track-container{
width:500px;
margin:auto;
margin-top:40px;
background:#111;
padding:40px;
border-radius:10px;
text-align:center;
}

input{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:5px;
background:#222;
color:white;
}

.track-btn{
width:100%;
padding:14px;
margin-top:20px;
background:#ff4fa3;
border:none;
color:white;
font-size:16px;
cursor:pointer;
border-radius:5px;
}

.track-btn:hover{
background:#ff2f90;
}

.status-box{
margin-top:30px;
background:#222;
padding:20px;
border-radius:8px;
}

.status{
margin:10px 0;
}

.active{
color:#ff4fa3;
font-weight:bold;
}

footer{
text-align:center;
padding:20px;
border-top:2px solid #ff4fa3;
margin-top:50px;
}

</style>
</head>

<body>

<header>
  <div class="logo">GlamAura Wigs</div>
  <div id="navbar-container"></div>
</header>
<script>
  fetch('navbar.html').then(r => r.text()).then(html => {
    document.getElementById('navbar-container').innerHTML = html;
    const script = document.createElement('script');
    script.src = 'navbar.js';
    document.body.appendChild(script);
  });
</script>

<h1>Track Your Order</h1>

<div class="track-container">

<p>Enter your order number to check delivery status.</p>

<input type="text" placeholder="Order Number">

<button class="track-btn">Track Order</button>

<div class="status-box">

<h3>Order Status</h3>

<div class="status active">✔ Order Confirmed</div>
<div class="status">✔ Processing</div>
<div class="status">✔ Shipped</div>
<div class="status">✔ Out for Delivery</div>
<div class="status">✔ Delivered</div>

</div>

</div>

<footer>
© 2026 GlamAura Wigs
</footer>

</body>
</html>
